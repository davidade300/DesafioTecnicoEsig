<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Cadastro de Responsaveis</title>
    <h:outputStylesheet library="css" name="styles.css"/>
</h:head>

<h:body>
    <div class="container">
        <h1 class="center-text"> Cadastrar Responsavel</h1>

        <h:form>
            Nome: <h:inputText value="#{responsavelController.responsavel.nome}"/>
            <br/>
            <h:commandButton styleClass="btn" value="Salvar" action="#{responsavelController.salvar}"/>
            <h:commandButton styleClass="btn" value="Cadastro de tarefas"
                             action="#{responsavelController.gotoCadastrarTarefa}"/>
        </h:form>

        <h2 class="center-text">Responsaveis Cadastrados</h2>
        <h:dataTable styleClass="dataTable" value="#{responsavelController.responsaveis}" var="r" border="1">
            <h:column>
                <f:facet name="header">ID</f:facet>
                <h:outputText value="#{r.id}"/>
            </h:column>
            <h:column>
                <f:facet name="header">Nome</f:facet>
                <h:outputText value="#{r.nome}"/>
            </h:column>

        </h:dataTable>
    </div>
</h:body>

</html>
