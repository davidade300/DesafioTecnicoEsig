<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Listar Tarefas</title>
    <h:outputStylesheet library="css" name="styles.css"/>
</h:head>
<h:body>
    <div class="container">
        <h1 class="center-text">Listagem de Tarefas</h1>
        <h:form>
            <div class="form-group">
                <label>Número:</label>
                <h:inputText value="#{tarefaController.filtroId}"/>
            </div>
            <div class="form-group">
                <label>Título/Descrição:</label>
                <h:inputText value="#{tarefaController.filtroTitulo}"/>
            </div>
            <div class="form-group">
                <label>Responsável:</label>
                <h:selectOneMenu value="#{tarefaController.filtroResponsavelId}">
                    <f:selectItem itemLabel="Select" itemValue=""/>
                    <f:selectItems value="#{tarefaController.responsaveis}" var="r"
                                   itemLabel="#{r.nome}" itemValue="#{r.id}"/>
                </h:selectOneMenu>
                <label>Situação:</label>
                <h:selectOneMenu value="#{tarefaController.filtroSituacao}">
                    <f:selectItem itemLabel="Todas" itemValue=""/>
                    <f:selectItems value="#{tarefaController.situacoes}" var="s"
                                   itemLabel="#{s.name()}" itemValue="#{s}"/>
                </h:selectOneMenu>
                <h:commandButton styleClass="btn" value="Buscar Tarefas"
                                 action="#{tarefaController.buscaFiltrada}"/>
            </div>
        </h:form>

        <h:dataTable styleClass="dataTable" value="#{tarefaController.tarefas}" var="t">
            <h:column>
                <f:facet name="header">Número</f:facet>
                <h:outputText value="#{t.id}"/>
            </h:column>
            <h:column>
                <f:facet name="header">Título</f:facet>
                <h:outputText value="#{t.titulo}"/>
            </h:column>
            <h:column>
                <f:facet name="header">Responsável</f:facet>
                <h:outputText value="#{t.responsavel.nome}"/>
            </h:column>
            <h:column>
                <f:facet name="header">Ações</f:facet>
                <h:form>
                    <h:commandLink value="Editar" action="#{tarefaController.gotoEditarTarefa(t)}"/>
                    |
                    <h:commandLink value="Excluir" action="#{tarefaController.excluir(t)}"/>
                    |
                    <h:commandLink value="Concluir" action="#{tarefaController.concluir(t)}"/>
                </h:form>
            </h:column>
        </h:dataTable>

        <div class="form-group" style="margin-top: 20px;">
            <h:form>
                <h:commandButton styleClass="btn" value="Cadastrar Tarefa"
                                 action="#{tarefaController.gotoCadastrarTarefa}"/>
            </h:form>
        </div>
    </div>
</h:body>
</html>
