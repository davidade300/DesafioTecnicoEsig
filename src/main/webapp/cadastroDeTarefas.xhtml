<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
>
<h:head>
    <title>Cadastrar Tarefa</title>
    <h:outputStylesheet library="css" name="styles.css"/>
</h:head>
<h:body>
    <h:form>
        <h:messages globalOnly="false" style="color: red;"/>
        <h1 class="center-text">Cadastrar Tarefa</h1>
        <div class="form-group">
            <label>Título:</label>
            <h:inputText value="#{tarefaController.tarefa.titulo}" required="true"
                         requiredMessage="titulo é obrigatório"/>
        </div>
        <div class="form-group">
            <label>Descrição:</label>
            <h:inputTextarea value="#{tarefaController.tarefa.descricao}" rows="4" cols="40"/>
        </div>
        <div class="form-group">
            <label>Responsável:</label>
            <h:selectOneMenu value="#{tarefaController.responsavelSelecionadoId}" required="true"
                             requiredMessage="responsavel é obrigatório">
                <f:selectItem itemLabel="Select" itemValue=""/>
                <f:selectItems value="#{tarefaController.responsaveis}" var="r"
                               itemLabel="#{r.nome}" itemValue="#{r.id}"/>
            </h:selectOneMenu>
            <label>Prioridade:</label>
            <h:selectOneMenu value="#{tarefaController.tarefa.prioridade}" required="true"
                             requiredMessage="prioridade é obrigatório">
                <f:selectItem itemLabel="Select" itemValue=""/>
                <f:selectItems value="#{tarefaController.prioridades}" var="p"
                               itemLabel="#{p.name()}" itemValue="#{p}"/>
            </h:selectOneMenu>
        </div>
        <div class="form-group">
            <label>Deadline:</label>
            <h:inputText value="#{tarefaController.tarefa.deadline}" pt:type="date" required="true"
                         requiredMessage="data é obrigatório"
                         xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">
                <f:convertDateTime pattern="yyyy-MM-dd"/>
            </h:inputText>
        </div>
        <div class="form-group">
            <h:commandButton styleClass="btn" value="Cadastrar" action="#{tarefaController.salvar}"/>
            <h:commandButton styleClass="btn" value="Listar Tarefas" action="#{tarefaController.gotoListarTarefas}"
                             immediate="true"/>
            <h:commandButton styleClass="btn" value="Cadastrar Responsavel"
                             action="#{tarefaController.gotoCadastrarResponsavel}"
                             immediate="true"/>
        </div>
    </h:form>
</h:body>
</html>
