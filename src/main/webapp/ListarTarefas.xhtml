<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <title>Listar Tarefas</title>
</h:head>

<h:body>
    <table border="1">
        <tr>
            <th>Título</th>
            <th>Descrição</th>
            <th>Responsável</th>
            <th>Prioridade</th>
            <th>Situação</th>
        </tr>
        <ui:repeat var="trf" value="#{tarefaRepository.tarefas}">
            <tr>
                <td>#{trf.titulo}</td>
                <td>#{trf.descricao}</td>
                <td>#{trf.responsavel}</td>
                <td>#{trf.prioridade}</td>
                <td>#{trf.situacao}</td>
            </tr>
        </ui:repeat>
    </table>
</h:body>

</html>
